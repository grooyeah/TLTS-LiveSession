version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: livesession-postgres
    environment:
      POSTGRES_DB: livesession
      POSTGRES_USER: livesession
      POSTGRES_PASSWORD: livesession123
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: livesession-redis
    ports:
      - "6379:6379"

volumes:
  postgres-data: